<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Student Performance Predictor</h1>
            <p>Predict academic performance based on key factors</p>
        </header>

        <div class="main-content">
            <div class="form-section">
                <h2>Enter Student Details</h2>
                <form id="predictionForm">
                    <div class="form-group">
                        <label for="attendance">Attendance (%)</label>
                        <input type="number" id="attendance" min="0" max="100" step="0.1" required>
                    </div>

                    <div class="form-group">
                        <label for="study_hours">Study Hours (per day)</label>
                        <input type="number" id="study_hours" min="0" max="24" step="0.1" required>
                    </div>

                    <div class="form-group">
                        <label for="internal_marks">Internal Marks (%)</label>
                        <input type="number" id="internal_marks" min="0" max="100" step="0.1" required>
                    </div>

                    <div class="form-group">
                        <label for="assignments_submitted">Assignments Submitted</label>
                        <input type="number" id="assignments_submitted" min="0" max="20" required>
                    </div>

                    <div class="form-group">
                        <label for="activities">Activities Participated</label>
                        <input type="number" id="activities" min="0" max="10" required>
                    </div>

                    <button type="submit" id="predictBtn">Predict Performance</button>
                </form>
            </div>

            <div class="result-section">
                <h2>Prediction Result</h2>
                <div id="result" class="result-card hidden">
                    <div class="prediction-display">
                        <span class="prediction-label">Predicted Performance:</span>
                        <span id="prediction" class="prediction-value"></span>
                    </div>
                    <div class="confidence-display">
                        <span class="confidence-label">Confidence Level:</span>
                        <span id="confidence" class="confidence-value"></span>
                    </div>
                </div>
                <div id="loading" class="loading hidden">Predicting...</div>
                <div id="error" class="error hidden"></div>
            </div>
        </div>

        <div class="history-section">
            <h2>Recent Predictions</h2>
            <button id="loadHistory">Load History</button>
            <div id="history" class="history-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
